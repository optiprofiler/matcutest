name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "53 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OMP_NUM_THREADS: "2"
      OPENBLAS_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      NUMEXPR_NUM_THREADS: "2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout OptiProfiler
        uses: actions/checkout@v4
        with:
          repository: optiprofiler/optiprofiler
          path: optiprofiler
          ref: main

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y 7zip || sudo apt-get install -y p7zip-full

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a

      - name: Install MatCUTEst and run adapter tests
        uses: matlab-actions/run-command@v2
        with:
          command: "addpath(fullfile(pwd, 'src')); install(pwd); run('tests/smoke_matcutest.m')"
